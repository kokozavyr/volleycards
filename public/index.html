<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Volley Cards</title>
<style>
  body { font-family: Arial; text-align:center; }
  #court { width:400px; height:600px; margin:20px auto; position:relative; border:2px solid black; }
  #net { position:absolute; top:50%; width:100%; height:2px; background:black; }
  .zone { position:absolute; width:33.33%; height:16.66%; border:1px solid #ccc; box-sizing:border-box; }
  #ball { width:20px; height:20px; background:red; border-radius:50%; position:absolute; transition: all 0.5s ease; }
</style>
</head>
<body>

<h2>Volley Cards</h2>
<div id="court">
  <div id="net"></div>
  <div id="ball"></div>
</div>

<script>
const ws = new WebSocket(location.origin.replace('http','ws'));

let myPlayer = null;
let state = null;

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if(msg.type==='STATE'){
    state = msg;
    myPlayer = msg.myPlayerNum || 1;
    updateBall();
  }
};

// ── ZONE POSITIONS (FIXED GRID) ──
function getZonePosition(zone, side){
  if(zone===0){
    return side===1
      ? {x:200, y:450}
      : {x:200, y:150};
  }

  const col = (zone-1)%3;
  const row = Math.floor((zone-1)/3);

  const x = col * 133 + 66;
  const yBase = row * 100 + 50;

  if(side===1){
    return { x, y: 300 + yBase };
  } else {
    return { x, y: 300 - yBase };
  }
}

// ── MAIN BALL SYSTEM ──
function updateBall(){
  if(!state) return;

  const ball = document.getElementById('ball');

  const side = state.ballSide;
  const zone = state.ballZone;

  const pos = getZonePosition(zone, side);

  ball.style.left = (pos.x - 10) + 'px';
  ball.style.top  = (pos.y - 10) + 'px';
}

// ── OPTIONAL: CLICK TO TEST PLAY ──
document.body.addEventListener('click', ()=>{
  ws.send(JSON.stringify({ type:'PLAY', cardIds:[1] }));
});

</script>

</body>
</html>
